        .container { width: 100%; max-width: 480px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box; }
        .league-menu { display: grid; grid-template-columns: 1fr; gap: 10px; width: 100%; max-width: 320px; margin-top: 20px; }
        .btn-league { background: var(--card); color: white; border: 1px solid #233554; padding: 18px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: bold; text-transform: uppercase; }
        .btn-league:hover { border-color: var(--neon); color: var(--neon); transform: translateY(-2px); }
        .stats-header { display: flex; justify-content: space-between; margin-bottom: 15px; background: var(--card); padding: 12px; border-radius: 12px; border: 1px solid #233554; }
        .career-path { display: flex; flex-direction: column; gap: 8px; min-height: 380px; margin-bottom: 15px; overflow-y: auto; }
        .club-block { background: var(--card); padding: 12px; border-radius: 10px; border-left: 4px solid var(--neon); animation: fadeIn 0.3s ease; }
        .club-stats { font-size: 0.75rem; color: var(--gold); margin-top: 4px; font-weight: bold; }
        .input-wrapper { position: relative; margin-bottom: 12px; }
        input { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid #233554; background: #0a192f; color: white; outline: none; box-sizing: border-box; font-size: 1rem; }
        .actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; }
        .btn-reveal { background: #1d3359; color: var(--neon); }
        .btn-hint { background: var(--gold); color: #020c1b; }
        #msg { margin-top: 12px; text-align: center; font-weight: bold; min-height: 24px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

let currentStack = [], player = {}, revealedIdx = 1, score = 0, time = 60, timer;

function initGame(k) {
    document.getElementById('startUI').style.display = 'none';
    currentStack = [...data[k]].sort(() => Math.random() - 0.5);
    score = 0; time = 60; document.getElementById('score').innerText = "0";
    next();
    timer = setInterval(() => {
        time--; document.getElementById('timer').innerText = time;
        if(time <= 0) { clearInterval(timer); alert("⌛ Fini ! Score : " + score); location.reload(); }
    }, 1000);
}

function next() {
    if(currentStack.length === 0) { clearInterval(timer); alert("🏆 Liste épuisée ! Score : " + score); location.reload(); return; }
    player = currentStack.shift(); revealedIdx = 1;
    document.getElementById('msg').innerText = "";
    document.getElementById('playerInput').value = "";
    show();
}

function show() {
    const div = document.getElementById('careerDisplay');
    div.innerHTML = "";
    for(let i=0; i<revealedIdx; i++) {
        const c = player.career[i];
        div.innerHTML += `<div class="club-block">
            <div style="display:flex; justify-content:space-between;"><strong>${c.c}</strong> <span>${c.y}</span></div>
            <div class="club-stats">${c.s}</div>
        </div>`;
    }
}

document.getElementById('playerInput').addEventListener('input', (e) => {
    const val = e.target.value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
    const target = player.name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
    if(val === target) {
        score += 10; document.getElementById('score').innerText = score;
        document.getElementById('msg').innerText = "✅ " + player.name;
        document.getElementById('msg').style.color = "var(--neon)";
        setTimeout(next, 800);
    }
});

function revealNext() { if(revealedIdx < player.career.length) { revealedIdx++; show(); } }
function showHint() { 
    document.getElementById('msg').innerText = "📍 " + player.nation; 
    document.getElementById('msg').style.color = "var(--gold)";
}
function skip() { 
    document.getElementById('msg').innerText = "❌ C'était : " + player.name; 
    document.getElementById('msg').style.color = "var(--red)";
    setTimeout(next, 1500); 
}
